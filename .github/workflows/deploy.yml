name: Deploy

on:
  push:
    branches: [develop, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_KEY: ${{ github.ref == 'refs/heads/master' && secrets.VITE_API_KEY_PROD || secrets.VITE_API_KEY_STAGING }}

      - name: Deploy to staging
        if: github.ref == 'refs/heads/develop'
        run: npx firebase-tools deploy --only hosting --project sportstakes-staging --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to production
        if: github.ref == 'refs/heads/master'
        run: npx firebase-tools deploy --only hosting --project sportstakes-prod --token ${{ secrets.FIREBASE_TOKEN }}
